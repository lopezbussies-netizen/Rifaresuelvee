<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve — Rifa Oficial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
:root{
  --azul:#0b2c5d;
  --azul2:#123c7a;
  --amarillo:#ffc400;
  --blanco:#ffffff;
  --gris:#f2f2f2;
}
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
body{background:var(--azul);color:var(--blanco);}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--azul),var(--azul2));
  padding:25px 15px 30px;
  position:relative;
  text-align:center;
}

header img.logo{
  max-width:60px;
  position:absolute;
  top:15px;
  left:15px;
}

header h1{
  margin:0;
  font-size:28px;
  font-weight:bold;
}

header .social-icons{
  position:absolute;
  top:15px;
  right:15px;
}

header .social-icons a{
  color:var(--amarillo);
  font-size:26px;
  margin-left:10px;
  text-decoration:none;
}

header .btn-main{
  background:var(--amarillo);
  color:#000;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin-top:15px;
  width:100%;
  max-width:250px;
}

/* CONTENIDO */
.section{padding:20px 15px;}
.card{
  background:var(--blanco);
  color:#000;
  border-radius:12px;
  padding:15px;
  max-width:480px;
  margin:20px auto;
  text-align:center;
}

.card img{width:100%;border-radius:10px;}
input,select{width:100%;padding:12px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
.total{font-weight:bold;margin:10px 0;}

.pay-btn{width:100%;padding:14px;margin:8px 0;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;}
.yape{background:#7b1fa2;color:#fff;}
.pm{background:var(--azul);color:#fff;}

.pay-box{display:none;background:var(--gris);padding:10px;border-radius:8px;font-size:14px;text-align:left;}

.progress{background:#ddd;border-radius:20px;overflow:hidden;margin:10px 0;}
.progress span{display:block;height:12px;width:0%;background:var(--amarillo);}

.btn-whatsapp{
  background:var(--amarillo);
  color:#000;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  width:100%;
  margin-top:10px;
}

footer{text-align:center;padding:15px;background:#061a36;font-size:14px;}

.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:#fff;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
}

/* 🔒 FIX DEFINITIVO CLICK REDES (NO MUEVE NADA) */
header .social-icons,
header .social-icons a{
  pointer-events:auto;
  z-index:9999;
}

header h1,
header .btn-main{
  pointer-events:none;
}

/* RESPONSIVE */
@media (max-width:600px){
  header img.logo{max-width:50px;}
  header h1{font-size:22px;}
}
</style>
</head>

<body>

<header>
  <img src="https://iili.io/flv7wJI.png" class="logo" alt="RifaResuelve">

  <div class="social-icons">
    <a href="https://www.instagram.com/rifaresuelve/" target="_blank" rel="noopener">
      <i class="fab fa-instagram"></i>
    </a>
    <a href="https://www.facebook.com/rifaresuelve/" target="_blank" rel="noopener">
      <i class="fab fa-facebook"></i>
    </a>
  </div>

  <h1>RifaResuelve</h1>

  <button class="btn-main"
    onclick="document.getElementById('formulario').scrollIntoView({behavior:'smooth'})">
    Comprar
  </button>
</header>

<section class="section card">
  <img src="https://iili.io/fleSinj.png" alt="Flyer">
  <div class="progress"><span id="barra"></span></div>
  <small id="porcentaje">0% vendidos</small>
</section>

<section class="section card" id="formulario">
  <select id="pais" onchange="calcular()">
    <option value="">Selecciona tu país</option>
    <option value="venezuela">Venezuela</option>
    <option value="peru">Perú</option>
  </select>

  <select id="cantidad" onchange="calcular()">
    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option>
  </select>

  <input id="nombre" placeholder="Nombre y apellido">
  <input id="dni" placeholder="Cédula / DNI">
  <input id="telefono" placeholder="Teléfono">
  <input id="referencia" placeholder="Número de referencia">

  <button class="pay-btn yape" onclick="mostrar('yape')">Yape</button>
  <div class="pay-box" id="yape">📲 Yape<br>+51 916 859 731<br>Angemar López</div>

  <button class="pay-btn pm" onclick="mostrar('pm')">Pago Móvil</button>
  <div class="pay-box" id="pm">📱 Pago Móvil<br>Banco Banesco</div>

  <div class="total">Total: <span id="total">0</span></div>

  <button class="btn-whatsapp" onclick="enviarWhatsApp()">Comprar y enviar</button>
</section>

<footer>© RifaResuelve</footer>

<a class="whatsapp" href="https://wa.me/584127962015" target="_blank">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
const ticketsTotales=600;
let ticketsVendidos=0;

function mostrar(id){
  yape.style.display="none";
  pm.style.display="none";
  document.getElementById(id).style.display="block";
}

function calcular(){
  const pais=paisSel.value;
  const cant=+cantidad.value;
  let precio=0,moneda="";
  if(pais==="peru"){precio=6;moneda="soles";mostrar("yape")}
  if(pais==="venezuela"){precio=200;moneda="Bs";mostrar("pm")}
  total.innerText=precio*cant+" "+moneda;
}
const paisSel=document.getElementById("pais");
const cantidad=document.getElementById("cantidad");
const total=document.getElementById("total");

function enviarWhatsApp(){
  window.open("https://wa.me/584127962015","_blank");
}
</script>

</body>
</html>
