<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RifaResuelve 1.0 — Premio oficial 300$</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body { font-family: Arial, sans-serif; background:#0a1d3c; color:#fff; margin:0; padding:0;}
  header { background:#062140; padding:15px; text-align:center; }
  header .header-inner { display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; }
  header img.logo { width:80px; border-radius:8px; }
  header h1 { margin:0; color:#FFD700; font-size:1.6em; text-align:center; }

  .container { max-width:900px; margin:auto; padding:20px; }
  .flyer-container { text-align:center; margin-bottom:30px; }
  .flyer-container img { max-width:90%; width:320px; border-radius:10px; }

  .section { background:#FFD700; color:#0a1d3c; padding:20px; border-radius:8px; margin-bottom:20px; }
  .section h2 { text-align:center; }

  input, select, button, textarea { width:100%; padding:8px; margin:5px 0 12px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; box-sizing:border-box; }
  button { background:#062140; color:#FFD700; cursor:pointer; border:none; }
  button:hover { background:#0a1d3c; }

  .bar-container { background:#ccc; border-radius:20px; overflow:hidden; margin-top:10px; }
  .bar { height:22px; background:#FFD700; width:0%; transition: width 0.5s; }

  .social { display:flex; justify-content:center; gap:40px; margin-top:20px; font-size:35px; }

  .datos-pago { display:none; padding:10px; background:#fff3b0; color:#0a1d3c; border-radius:5px; text-align:center; font-weight:bold; }

  .payment-buttons { display:flex; justify-content:center; gap:15px; margin-bottom:15px; flex-wrap:wrap; }
  .payment-buttons button { width:auto; padding:10px 20px; }

  .small { font-size:0.9em; color:#062140; }

  @media(max-width:820px){
    .container{padding:12px}
    header img.logo{width:60px}
    .flyer-container img{width:90%}
  }

  /* Panel styles for embedded panel window if opened same origin */
  .panel-btn { background:#FFD700; color:#0a1d3c; padding:10px 14px; border-radius:6px; font-weight:bold; cursor:pointer; border:none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="https://i.imgur.com/EbxVPFl.png" alt="Logo Rifa" class="logo">
    <h1>🎉 RifaResuelve 1.0 – Premio oficial 300$ 🎉</h1>
  </div>
</header>

<div class="container">

  <div class="flyer-container">
    <img src="https://i.imgur.com/XeDhygR.png" alt="Flyer de la rifa">
  </div>

  <!-- PÁGINA PÚBLICA -->
  <div id="publico">

    <div class="section">
      <h2>Selecciona tus tickets</h2>
      <select id="tickets">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="section">
      <h2>Datos Personales</h2>
      <input type="text" id="nombre" placeholder="Nombre y Apellido">
      <input type="text" id="cedula" placeholder="Cédula / DNI">
      <input type="text" id="telefono" placeholder="Número de teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <select id="pais">
        <option value="venezuela">Venezuela</option>
        <option value="peru">Perú</option>
      </select>
    </div>

    <div class="section">
      <h2>Método de Pago</h2>
      <div class="payment-buttons">
        <button type="button" id="btnYape">Yape</button>
        <button type="button" id="btnPagoMovil">Pago Móvil</button>
      </div>

      <div id="datosPago" class="datos-pago"></div>

      <!-- Campo referencia que aparece sólo al elegir un método de pago -->
      <div id="refContainer" style="display:none;">
        <label class="small">Ingresa tu número de referencia del pago (obligatorio)</label>
        <input type="text" id="refPago" placeholder="Número de referencia">
      </div>

      <p id="total">💰 Total a pagar: 150 Bs</p>
    </div>

    <div class="section">
      <label><input type="checkbox" id="terminos"> Acepto términos incondicionales</label>
      <button id="comprar">Comprar y enviar a WhatsApp</button>
      <p id="compraMensaje" class="small" style="display:none;color:#fff;background:#d9534f;padding:8px;border-radius:6px;margin-top:10px;"></p>
    </div>

    <div class="section">
      <h2>Porcentaje de tickets vendidos</h2>
      <div class="bar-container"><div class="bar" id="progressBar"></div></div>
      <p class="small" id="contadorTickets" style="text-align:center; margin-top:8px;"></p>
    </div>

    <div class="section">
      <h2>Verificador de Boletos</h2>
      <input type="text" id="verificar" placeholder="Ingresa tu número de teléfono">
      <p id="resultadoVerificador">Aquí se mostrará tu estado de tickets</p>
    </div>

    <div class="social">
      <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
    </div>

    <div style="text-align:center;margin-top:18px;">
      <button id="btnSoporte" class="panel-btn">Centro de ayuda (Panel Administrativo)</button>
    </div>

  </div> <!-- FIN PUBLICO -->

</div> <!-- FIN container -->

<script>
/* -------------------------
   CONSTANTES Y UTILIDADES
   ------------------------- */
const MAX_TICKETS = 600;
const STORAGE_KEYS = {
  registros: 'rifa_registros_v1',
  available: 'rifa_available_v1',
  vendidos: 'rifa_vendidos_v1',
  paused: 'rifa_paused_v1'
};

// Helper: formato 3 dígitos
function fmt3(n){ return String(n).padStart(3,'0'); }

// Guardar/leer JSON en localStorage
function save(key, val){ localStorage.setItem(key, JSON.stringify(val)); }
function load(key, fallback){ const v = localStorage.getItem(key); return v? JSON.parse(v) : fallback; }

/* -------------------------
   INICIALIZACIÓN STORAGE
   ------------------------- */
// Registros: { id: timestampId, nombre, cedula, telefono, correo, pais, metodo, referencia, tickets, numeros:[...], estado }
let registros = load(STORAGE_KEYS.registros, []);
let available = load(STORAGE_KEYS.available, null);
let vendidos = load(STORAGE_KEYS.vendidos, 0);
let paused = load(STORAGE_KEYS.paused, false);

// Si no hay lista de números disponible, creamos y barajamos 1..600
if(!available){
  available = [];
  for(let i=1;i<=MAX_TICKETS;i++) available.push(i);
  // shuffle Fisher-Yates
  for(let i=available.length-1;i>0;i--){
    const j = Math.floor(Math.random()* (i+1));
    [available[i], available[j]] = [available[j], available[i]];
  }
  save(STORAGE_KEYS.available, available);
  save(STORAGE_KEYS.registros, registros);
  save(STORAGE_KEYS.vendidos, vendidos);
  save(STORAGE_KEYS.paused, paused);
}

/* -------------------------
   ELEMENTOS PÚBLICOS
   ------------------------- */
const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const totalP = document.getElementById('total');
const datosPagoDiv = document.getElementById('datosPago');
const progressBar = document.getElementById('progressBar');
const verificarInput = document.getElementById('verificar');
const btnYape = document.getElementById('btnYape');
const btnPagoMovil = document.getElementById('btnPagoMovil');
const refContainer = document.getElementById('refContainer');
const refPago = document.getElementById('refPago');
const comprarBtn = document.getElementById('comprar');
const compraMensaje = document.getElementById('compraMensaje');
const contadorTicketsP = document.getElementById('contadorTickets');

/* -------------------------
   Funciones UI y lógica
   ------------------------- */
function actualizarCosto(){
  const pais = paisSelect.value;
  const tickets = parseInt(ticketsSelect.value);
  const costoTicket = pais==='venezuela'?150:5;
  totalP.textContent = `💰 Total a pagar: ${costoTicket*tickets} ${pais==='venezuela'?'Bs':'S/'}`;
}
ticketsSelect.addEventListener('change', actualizarCosto);
paisSelect.addEventListener('change', actualizarCosto);
actualizarCosto();

function actualizarProgressUI(){
  const pct = Math.round((vendidos / MAX_TICKETS) * 100);
  progressBar.style.width = pct + '%';
  contadorTicketsP.textContent = `Tickets vendidos: ${vendidos} / ${MAX_TICKETS} (${pct}%)`;
}
actualizarProgressUI();

function actualizarPauseUI(){
  paused = load(STORAGE_KEYS.paused, false);
  if(paused){
    comprarBtn.disabled = true;
    comprarBtn.style.opacity = 0.6;
    compraMensaje.style.display = 'block';
    compraMensaje.textContent = "Ventas actualmente PAUSADAS. Intenta más tarde.";
  } else {
    comprarBtn.disabled = false;
    comprarBtn.style.opacity = 1;
    compraMensaje.style.display = 'none';
  }
}
actualizarPauseUI();

/* -------------------------
   Pago: mostrar datos + copiar
   ------------------------- */
btnYape.addEventListener('click', ()=>{
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = "Datos Yape:<br>📱 +51 916 859 731<br>Angemar López<br><span class='small'>Se ha copiado el número al portapapeles</span>";
  refContainer.style.display = 'block';
  copyToClipboard('+51916859731');
});
btnPagoMovil.addEventListener('click', ()=>{
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = "Datos Pago Móvil:<br>📱 +58 414 1234567<br>Angemar López<br><span class='small'>Se ha copiado el número al portapapeles</span>";
  refContainer.style.display = 'block';
  copyToClipboard('+584141234567');
});
function copyToClipboard(text){
  navigator.clipboard?.writeText(text).catch(()=>{ /* ignore */ });
}

/* -------------------------
   Comprar -> validar referencia y enviar WhatsApp
   ------------------------- */
const WHATSAPP_NUMBER = '51921041484'; // confirmar: mantiene el que estabas usando
comprarBtn.addEventListener('click', ()=>{
  // refrescar estado pause desde storage antes de validar
  actualizarPauseUI();
  if(paused){ alert('Las ventas están pausadas'); return; }

  // validar campos
  const nombre = document.getElementById('nombre').value.trim();
  const cedula = document.getElementById('cedula').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const pais = paisSelect.value;
  const tickets = parseInt(ticketsSelect.value);

  if(!nombre || !telefono){ alert('Por favor completa tu nombre y teléfono'); return; }

  // referencia obligatoria si eligieron método: comprobamos que campo de referencia visible y tenga valor
  if(refContainer.style.display !== 'none'){
    const refVal = refPago.value.trim();
    if(!refVal){
      alert('Por favor ingresa tu número de referencia del pago');
      return;
    }
  } else {
    alert('Por favor selecciona un método de pago (Yape o Pago Móvil)');
    return;
  }

  // confirmar términos
  if(!document.getElementById('terminos').checked){ alert("Debes aceptar los términos"); return; }

  // preparar mensaje
  const costoTicket = pais==='venezuela'?150:5;
  const total = costoTicket * tickets;
  const refVal = refPago.value.trim();

  const mensaje = `Hola. Compra de tickets:\nNombre: ${nombre}\nCédula: ${cedula}\nTel: ${telefono}\nCorreo: ${correo}\nPaís: ${pais}\nTickets: ${tickets}\nTotal: ${total} ${pais==='venezuela'?'Bs':'S/'}\nReferencia: ${refVal}`;

  // abrir WhatsApp en nueva pestaña - hacemos la apertura directamente para evitar bloqueos
  const waUrl = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(mensaje)}`;
  window.open(waUrl, '_blank');

  // NOTA: no registramos nada en la web aquí (registro lo haces tú manualmente en el panel)
  alert('Mensaje enviado a WhatsApp. Por favor verifica el pago y registra la venta en el panel administrativo.');
});

/* -------------------------
   Verificador local (busca en registros)
   ------------------------- */
verificarInput.addEventListener('input', ()=>{
  const tel = verificarInput.value.trim();
  registros = load(STORAGE_KEYS.registros, []);
  const found = registros.filter(r => r.telefono === tel);
  if(found.length){
    const lines = found.map(f => `Tickets: ${f.tickets} - Números: ${f.numeros.map(n=>fmt3(n)).join(', ')} - Estado: ${f.estado}`).join('\n');
    document.getElementById('resultadoVerificador').textContent = lines;
  } else {
    document.getElementById('resultadoVerificador').textContent = "No se encontraron tickets registrados.";
  }
});

/* -------------------------
   Sincronización entre pestañas (storage events)
   ------------------------- */
window.addEventListener('storage', (e)=>{
  if(e.key === STORAGE_KEYS.vendidos || e.key === STORAGE_KEYS.registros || e.key === STORAGE_KEYS.available){
    registros = load(STORAGE_KEYS.registros, []);
    available = load(STORAGE_KEYS.available, available);
    vendidos = load(STORAGE_KEYS.vendidos, vendidos);
    actualizarProgressUI();
  }
  if(e.key === STORAGE_KEYS.paused){
    actualizarPauseUI();
  }
});

/* -------------------------
   PANEL ADMINISTRATIVO (se abre dentro del click del botón)
   ------------------------- */
document.getElementById('btnSoporte').addEventListener('click', ()=>{
  // pedimos clave primero (esto está dentro del click para evitar popup blockers)
  const clave = prompt('Ingresa el código de acceso al panel:');
  if(clave !== 'rifa2025'){ alert('Código incorrecto'); return; }

  // abrimos ventana inmediatamente (evita bloqueos)
  const panel = window.open('','_blank','noopener,noreferrer');
  if(!panel){ alert('Permite ventanas emergentes en tu navegador'); return; }

  // construimos contenido del panel
  panel.document.title = 'Panel Administrativo RifaResuelve 1.0';
  const style = `
    body{font-family:Arial, sans-serif;background:#0a1d3c;color:#fff;padding:20px}
    h1{color:#FFD700;text-align:center}
    .card{background:#fff3b0;color:#0a1d3c;padding:12px;border-radius:8px;margin-bottom:12px}
    input,select,button,textarea{padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;width:100%;box-sizing:border-box}
    button{background:#062140;color:#FFD700;border:none;padding:10px;cursor:pointer}
    table{width:100%;border-collapse:collapse;color:#0a1d3c}
    th,td{border:1px solid #ccc;padding:6px;text-align:left}
    .small{font-size:0.9em;color:#062140}
    .danger{background:#d9534f;color:#fff;padding:6px;border:none;border-radius:6px;cursor:pointer}
    .ok{background:#28a745;color:#fff;padding:6px;border:none;border-radius:6px;cursor:pointer}
  `;
  panel.document.head.innerHTML = `<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Panel Administrativo</title><style>${style}</style>`;

  panel.document.body.innerHTML = `
    <h1>Panel Administrativo — RifaResuelve 1.0</h1>

    <div class="card">
      <p>Total tickets vendidos: <strong id="panelVendidos">0</strong> / ${MAX_TICKETS}</p>
      <p>Tickets restantes: <strong id="panelRestantes">0</strong></p>
      <button id="togglePause" class="small"></button>
    </div>

    <div class="card">
      <h3>Registrar venta manual</h3>
      <label>Nombre completo</label><input id="panelNombre" placeholder="Nombre completo">
      <label>Cédula / DNI</label><input id="panelCedula" placeholder="Cédula / DNI">
      <label>Teléfono</label><input id="panelTelefono" placeholder="Número telefónico">
      <label>Correo</label><input id="panelCorreo" placeholder="Correo electrónico">
      <label>País</label>
      <select id="panelPais"><option value="venezuela">Venezuela</option><option value="peru">Perú</option></select>
      <label>Cantidad de tickets</label><input id="panelTickets" type="number" min="1" max="600" value="1">
      <label>Método de pago</label>
      <select id="panelMetodo"><option value="yape">Yape</option><option value="pago_movil">Pago Móvil</option><option value="otro">Otro</option></select>
      <label>Referencia de pago</label><input id="panelReferencia" placeholder="Número de referencia">
      <label>Observaciones</label><textarea id="panelObservaciones" rows="2" placeholder="Notas..."></textarea>
      <div style="display:flex;gap:8px;">
        <button id="panelRegistrar" class="ok" style="flex:1">Registrar venta</button>
        <button id="panelExport" style="flex:1">Exportar CSV</button>
      </div>
    </div>

    <div class="card">
      <h3>Registros</h3>
      <input id="panelBuscar" placeholder="Buscar por teléfono..." class="small">
      <div style="max-height:280px;overflow:auto;margin-top:8px;"><table id="tablaRegistros"><thead><tr><th>Tel</th><th>Nombre</th><th>Tickets</th><th>Números</th><th>Estado</th><th>Acciones</th></tr></thead><tbody></tbody></table></div>
    </div>
  `;

  // referencias del panel
  const pd = panel.document;
  const panelVendidos = pd.getElementById('panelVendidos');
  const panelRestantes = pd.getElementById('panelRestantes');
  const togglePause = pd.getElementById('togglePause');
  const panelNombre = pd.getElementById('panelNombre');
  const panelCedula = pd.getElementById('panelCedula');
  const panelTelefono = pd.getElementById('panelTelefono');
  const panelCorreo = pd.getElementById('panelCorreo');
  const panelTickets = pd.getElementById('panelTickets');
  const panelMetodo = pd.getElementById('panelMetodo');
  const panelReferencia = pd.getElementById('panelReferencia');
  const panelObservaciones = pd.getElementById('panelObservaciones');
  const panelRegistrar = pd.getElementById('panelRegistrar');
  const panelExport = pd.getElementById('panelExport');
  const tablaBody = pd.querySelector('#tablaRegistros tbody');
  const panelBuscar = pd.getElementById('panelBuscar');

  // función para refrescar datos del panel desde localStorage
  function refreshPanel(){
    registros = load(STORAGE_KEYS.registros, []);
    available = load(STORAGE_KEYS.available, available);
    vendidos = load(STORAGE_KEYS.vendidos, vendidos);
    paused = load(STORAGE_KEYS.paused, paused);

    panelVendidos.textContent = vendidos;
    panelRestantes.textContent = Math.max(0, MAX_TICKETS - vendidos);
    togglePause.textContent = paused ? 'Reanudar Ventas' : 'Pausar Ventas';

    // llenar tabla
    tablaBody.innerHTML = '';
    registros.slice().reverse().forEach(r => {
      const tr = pd.createElement('tr');
      const numerosText = (r.numeros && r.numeros.length) ? r.numeros.map(n=>fmt3(n)).join(', ') : '';
      tr.innerHTML = `<td>${r.telefono}</td><td>${r.nombre}</td><td>${r.tickets}</td><td style="max-width:260px;white-space:pre-wrap">${numerosText}</td><td>${r.estado}</td>
        <td>
          <button data-id="${r.id}" class="anular small danger">Anular</button>
          <button data-id="${r.id}" class="copiar small">Copiar</button>
        </td>`;
      tablaBody.appendChild(tr);
    });
  }

  // toggle pausa
  togglePause.addEventListener('click', ()=>{
    paused = !paused;
    save(STORAGE_KEYS.paused, paused);
    // notificar a otras pestañas
    localStorage.setItem('rifa_meta', Date.now());
    refreshPanel();
    // actualizar UI en la página principal también (storage event)
    alert(paused ? 'Ventas pausadas' : 'Ventas reanudadas');
  });

  // registrar venta manual
  panelRegistrar.addEventListener('click', ()=>{
    // validar campos
    const nombre = panelNombre.value.trim();
    const telefono = panelTelefono.value.trim();
    const ticketsNum = parseInt(panelTickets.value);
    const referencia = panelReferencia.value.trim();
    const metodo = panelMetodo.value;
    const cedula = panelCedula.value.trim();
    const correo = panelCorreo.value.trim();
    const pais = pd.getElementById('panelPais').value;
    const observ = panelObservaciones.value.trim();

    if(!nombre || !telefono || !ticketsNum || ticketsNum<=0){ alert('Completa nombre, teléfono y cantidad de tickets'); return; }
    if(ticketsNum > available.length){ alert('No hay suficientes tickets disponibles'); return; }
    if(!referencia){ if(!confirm('No ingresaste referencia. Deseas continuar sin referencia?')) return; }

    // asignar números únicos (tomamos del array 'available' los primeros ticketsNum)
    const asignados = [];
    for(let i=0;i<ticketsNum;i++){
      const num = available.shift(); // ya está barajado
      if(num === undefined){ alert('No hay más números disponibles'); break; }
      asignados.push(num);
    }
    vendidos += asignados.length;

    // crear registro
    const registro = {
      id: 'r' + Date.now() + Math.floor(Math.random()*1000),
      nombre, cedula, telefono, correo, pais, metodo, referencia, tickets: asignados.length,
      numeros: asignados, observaciones: observ, estado: 'pendiente',
      fecha: new Date().toISOString()
    };
    registros.push(registro);

    // guardar todo
    save(STORAGE_KEYS.registros, registros);
    save(STORAGE_KEYS.available, available);
    save(STORAGE_KEYS.vendidos, vendidos);
    // marcar meta para forzar storage event
    localStorage.setItem('rifa_meta', Date.now());

    // refrescar UI
    refreshPanel();
    alert(`Registrada venta: ${registro.tickets} tickets asignados: ${registro.numeros.map(n=>fmt3(n)).join(', ')}`);
    // limpiar campos básicos
    panelNombre.value = panelCedula.value = panelTelefono.value = panelCorreo.value = panelReferencia.value = panelObservaciones.value = '';
    panelTickets.value = 1;
  });

  // export CSV
  panelExport.addEventListener('click', ()=>{
    registros = load(STORAGE_KEYS.registros, []);
    if(!registros.length){ alert('No hay registros para exportar'); return; }
    const header = ['id','fecha','nombre','cedula','telefono','correo','pais','metodo','referencia','tickets','numeros','estado','observaciones'];
    const rows = registros.map(r => [
      r.id, r.fecha, r.nombre, r.cedula, r.telefono, r.correo, r.pais, r.metodo, r.referencia, r.tickets, r.numeros.map(n=>fmt3(n)).join('|'), r.estado, (r.observaciones||'')
    ]);
    const csv = [header, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = pd.createElement('a');
    a.href = url; a.download = 'registros_rifa.csv'; a.style.display='none';
    pd.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
  });

  // acciones de la tabla (delegation)
  tablaBody.addEventListener('click', (ev)=>{
    const btn = ev.target;
    const id = btn.getAttribute('data-id');
    if(btn.classList.contains('anular')){
      if(!confirm('Confirmar anular este registro?')) return;
      registros = load(STORAGE_KEYS.registros, []);
      const idx = registros.findIndex(r=>r.id===id);
      if(idx===-1){ alert('Registro no encontrado'); return; }
      const reg = registros[idx];
      // devolver números al pool (los ponemos al final y los mezclamos)
      available.push(...reg.numeros);
      // simple shuffle para mezclar los devueltos
      for(let i=available.length-1;i>0;i--){ const j=Math.floor(Math.random()* (i+1)); [available[i],available[j]]=[available[j],available[i]]; }
      vendidos -= reg.numeros.length;
      // marcar estado anulado
      registros[idx].estado = 'anulado';
      save(STORAGE_KEYS.available, available);
      save(STORAGE_KEYS.registros, registros);
      save(STORAGE_KEYS.vendidos, vendidos);
      localStorage.setItem('rifa_meta', Date.now());
      refreshPanel();
      alert('Registro anulado y números devueltos al pool.');
    }
    if(btn.classList.contains('copiar')){
      registros = load(STORAGE_KEYS.registros, []);
      const reg = registros.find(r=>r.id===id);
      if(!reg){ alert('Registro no encontrado'); return; }
      const text = `Números: ${reg.numeros.map(n=>fmt3(n)).join(', ')}`;
      navigator.clipboard?.writeText(text).then(()=> alert('Números copiados al portapapeles') ).catch(()=> alert('No se pudo copiar'));
    }
  });

  // búsqueda en tabla
  panelBuscar.addEventListener('input', ()=>{
    const q = panelBuscar.value.trim();
    const trs = tablaBody.querySelectorAll('tr');
    trs.forEach(tr=>{
      if(!q){ tr.style.display=''; return; }
      if(tr.textContent.toLowerCase().includes(q.toLowerCase())) tr.style.display=''; else tr.style.display='none';
    });
  });

  // iniciar panel UI
  refreshPanel();

  // cada 1s refresca panel para estar al día si otra instancia modifica el storage
  const panelInterval = panel.setInterval(()=>{ refreshPanel(); }, 1000);

  // cuando cierre el panel, limpiamos interval
  panel.addEventListener('beforeunload', ()=>{ panel.clearInterval(panelInterval); });

}); // fin open panel

</script>
</body>
</html>
