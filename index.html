<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve 1.0 – Premio oficial 300$</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body { font-family: Arial, sans-serif; background:#0a1d3c; color:#fff; margin:0; padding:0;}
header { background:#062140; padding:15px; text-align:center; }
header .header-inner { display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; }
header img.logo { width:80px; border-radius:8px; }
header h1 { margin:0; color:#FFD700; font-size:1.6em; text-align:center; }

.container { max-width:700px; margin:auto; padding:20px; }
.flyer-container { text-align:center; margin-bottom:30px; }
.flyer-container img { max-width:90%; width:300px; border-radius:10px; }

.section { background:#FFD700; color:#0a1d3c; padding:20px; border-radius:8px; margin-bottom:20px; }
.section h2 { text-align:center; }

input, select, button { width:100%; padding:8px; margin:5px 0 15px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; }
button { background:#062140; color:#FFD700; cursor:pointer; border:none; }
button:hover { background:#0a1d3c; }

.bar-container { background:#ccc; border-radius:20px; overflow:hidden; margin-top:10px; }
.bar { height:20px; background:#FFD700; width:0%; }

.social { display:flex; justify-content:center; gap:40px; margin-top:20px; font-size:35px; }

.datos-pago { display:none; padding:10px; background:#fff3b0; color:#0a1d3c; border-radius:5px; text-align:center; font-weight:bold; }

.soporte-container { margin-top:20px; text-align:center; }
.soporte-container input { padding:8px 12px; font-size:16px; width:200px; border-radius:5px; border:1px solid #ccc; text-align:center; }
.soporte-container button { padding:8px 15px; font-size:16px; border-radius:5px; border:none; background-color:#28a745; color:white; cursor:pointer; margin-left:5px; }
.soporte-container button:hover { background-color:#218838; }

.payment-buttons { display:flex; justify-content:center; gap:15px; margin-bottom:15px; }
.payment-buttons button { width:auto; padding:10px 20px; }

@media(max-width:600px){
  header .header-inner { flex-direction: column; }
  header img.logo { width:60px; }
  header h1 { font-size:1.3em; }
  .flyer-container img { width:90%; }
  .soporte-container input { width:150px; margin-bottom:10px; }
  .soporte-container button { margin-left:0; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="https://i.imgur.com/EbxVPFl.png" alt="Logo Rifa" class="logo">
    <h1>🎉 RifaResuelve 1.0 – Premio oficial 300$ 🎉</h1>
  </div>
</header>

<div class="container">

  <!-- Flyer centrado -->
  <div class="flyer-container">
    <img src="https://i.imgur.com/XeDhygR.png" alt="Flyer de la rifa">
  </div>

  <!-- PÁGINA PÚBLICA -->
  <div id="publico">

    <div class="section">
      <h2>Selecciona tus tickets</h2>
      <select id="tickets">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="section">
      <h2>Datos Personales</h2>
      <input type="text" id="nombre" placeholder="Nombre y Apellido">
      <input type="text" id="cedula" placeholder="Cédula / DNI">
      <input type="text" id="telefono" placeholder="Número de teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <select id="pais">
        <option value="venezuela">Venezuela</option>
        <option value="peru">Perú</option>
      </select>
    </div>

    <div class="section">
      <h2>Método de Pago</h2>
      <div class="payment-buttons">
        <button type="button" id="btnYape">Yape</button>
        <button type="button" id="btnPagoMovil">Pago Móvil</button>
      </div>
      <div id="datosPago" class="datos-pago"></div>
      <p id="total">💰 Total a pagar: 150 Bs</p>
    </div>

    <div class="section">
      <label><input type="checkbox" id="terminos"> Acepto términos incondicionales</label>
      <button id="comprar">Comprar y enviar a WhatsApp</button>
    </div>

    <div class="section">
      <h2>Porcentaje de tickets vendidos</h2>
      <div class="bar-container"><div class="bar" id="progressBar"></div></div>
    </div>

    <div class="section">
      <h2>Verificador de Boletos</h2>
      <input type="text" id="verificar" placeholder="Ingresa tu número de teléfono">
      <p id="resultadoVerificador">Aquí se mostrará tu estado de tickets</p>
    </div>

    <div class="social">
      <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
    </div>

    <div class="soporte-container">
      <input type="password" placeholder="" id="codigoSoporte">
      <button onclick="accederSoporte()">Centro de ayuda</button>
    </div>

  </div> <!-- FIN PUBLICO -->

</div> <!-- FIN container -->

<script>
// Variables principales
const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const totalP = document.getElementById('total');
const datosPagoDiv = document.getElementById('datosPago');
const progressBar = document.getElementById('progressBar');
const verificarInput = document.getElementById('verificar');

let ticketsVendidos = 0;
const registros = {};

// Actualizar total
function actualizarCosto(){
  const pais = paisSelect.value;
  const tickets = parseInt(ticketsSelect.value);
  const costoTicket = pais==='venezuela'?150:5;
  totalP.textContent = `💰 Total a pagar: ${costoTicket*tickets} ${pais==='venezuela'?'Bs':'S/'}`;
}
ticketsSelect.addEventListener('change', actualizarCosto);
paisSelect.addEventListener('change', actualizarCosto);
actualizarCosto();

// Botones de pago
document.getElementById('btnYape').addEventListener('click', () => {
    datosPagoDiv.style.display='block';
    datosPagoDiv.innerHTML = "Datos Yape:<br>📱 +51 916 859 731<br>Angemar López";
});
document.getElementById('btnPagoMovil').addEventListener('click', () => {
    datosPagoDiv.style.display='block';
    datosPagoDiv.innerHTML = "Datos Pago Móvil:<br>📱 +58 414 1234567<br>Angemar López";
});

// Comprar tickets
document.getElementById('comprar').addEventListener('click', ()=>{
    if(ticketsVendidos>=600){ alert('Todos los tickets se han vendido'); return; }
    if(!document.getElementById('terminos').checked){ alert("Debes aceptar los términos"); return; }

    const nombre = document.getElementById('nombre').value;
    const cedula = document.getElementById('cedula').value;
    const telefono = document.getElementById('telefono').value;
    if(registros[telefono]){ alert("Este teléfono ya tiene tickets registrados"); return; }
    const correo = document.getElementById('correo').value;
    const pais = paisSelect.value;
    const tickets = parseInt(ticketsSelect.value);
    if(ticketsVendidos + tickets > 600){ alert("No hay suficientes tickets disponibles"); return; }

    const costoTicket = pais==='venezuela'?150:5;
    const total = costoTicket * tickets;

    const mensaje = `Hola. Compra de tickets:\nNombre: ${nombre}\nCédula: ${cedula}\nTel: ${telefono}\nCorreo: ${correo}\nPaís: ${pais}\nTickets: ${tickets}\nTotal: ${total} ${pais==='venezuela'?'Bs':'S/'}`;
    window.open(`https://wa.me/51921041484?text=${encodeURIComponent(mensaje)}`, "_blank");

    registros[telefono] = { tickets, estado:'pendiente' };
    ticketsVendidos += tickets;
    progressBar.style.width = (ticketsVendidos/600*100)+'%';
});

// Verificador
verificarInput.addEventListener('input', ()=>{
    const tel = verificarInput.value;
    if(registros[tel]){
        document.getElementById('resultadoVerificador').textContent = `Tienes ${registros[tel].tickets} tickets. Estado: ${registros[tel].estado}`;
    } else {
        document.getElementById('resultadoVerificador').textContent = "No se encontraron tickets registrados.";
    }
});
