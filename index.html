<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve — Rifa Oficial</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
:root{
  --azul:#0b2c5d;
  --azul2:#123c7a;
  --amarillo:#ffc400;
  --blanco:#ffffff;
  --gris:#f5f5f5;
}
*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;margin:0;padding:0;}
body{background:var(--gris); color:#000;}
header{
  background: linear-gradient(90deg, var(--azul), var(--azul2));
  padding:15px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
header img.logo{max-width:120px;}
header .social-icons a{
  color:#fff;
  font-size:24px;
  margin-left:10px;
  text-decoration:none;
}
header .social-icons a:hover{opacity:0.8;}
.btn-main{
  display:block;
  margin:20px auto;
  background:var(--amarillo);
  color:#000;
  font-size:18px;
  font-weight:bold;
  padding:12px 30px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition: 0.3s;
}
.btn-main:hover{opacity:0.9;}
.card{
  background:#fff;
  border-radius:8px;
  padding:15px;
  max-width:480px;
  margin:15px auto;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.card img{width:100%; border-radius:6px;}
.progress{background:#ddd; border-radius:10px; overflow:hidden; margin-top:10px; height:12px;}
.progress span{display:block; height:12px; width:0%; background:var(--amarillo);}
#porcentaje{font-size:14px; margin-top:5px; display:block;}
input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
.pay-btn{
  width:48%;
  padding:12px;
  margin:5px 1%;
  border:none;
  border-radius:6px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}
.yape{background: #7b1fa2; color:#fff;}
.pm{background: #0b2c5d; color:#fff;}
.pay-btn:hover{opacity:0.9;}
.pay-box{display:none; text-align:left; background:#f5f5f5; padding:10px; border-radius:6px; margin-bottom:10px;}
.total{font-weight:bold; margin:10px 0;}
.btn-whatsapp{
  display:block;
  width:100%;
  background:var(--amarillo);
  color:#000;
  font-size:18px;
  font-weight:bold;
  padding:12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}
.btn-whatsapp:hover{opacity:0.9;}
#top-compradores{
  background:#fff;
  border-radius:6px;
  padding:10px;
  margin:20px auto 30px;
  max-width:480px;
  text-align:left;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
#top-compradores h3{margin-bottom:10px;}
#top-compradores ul{list-style:none; padding:0;}
#top-compradores li{padding:5px 0; border-bottom:1px solid #eee;}
#top-compradores li:last-child{border-bottom:none;}
footer{
  text-align:center;
  padding:15px;
  background: var(--azul2);
  color:#fff;
  font-size:14px;
}
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  color:#fff;
  width:55px;
  height:55px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  text-decoration:none;
  z-index:10;
}
</style>
</head>
<body>

<header>
  <img src="https://iili.io/flegDTF.jpg" alt="RifaResuelve" class="logo">
  <div class="social-icons">
    <a href="https://www.instagram.com/rifaresuelve/" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="https://www.facebook.com/rifaresuelve/" target="_blank"><i class="fab fa-facebook"></i></a>
  </div>
</header>

<button class="btn-main" onclick="document.getElementById('formulario').scrollIntoView({behavior:'smooth'})">Comprar</button>

<section class="card">
  <img src="https://iili.io/fleSinj.png" alt="Flyer RifaResuelve">
  <div class="progress"><span id="barra"></span></div>
  <small id="porcentaje">0% vendidos</small>
</section>

<section class="card" id="formulario">
  <label>Selecciona tu país</label>
  <select id="pais" onchange="calcular()">
    <option value="">Selecciona</option>
    <option value="venezuela">Venezuela</option>
    <option value="peru">Perú</option>
  </select>

  <label>Cantidad de tickets</label>
  <select id="cantidad" onchange="calcular()">
    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
    <option value="10">10</option>
  </select>

  <input type="text" placeholder="Nombre y apellido" id="nombre">
  <input type="text" placeholder="Cédula / DNI" id="dni">
  <input type="tel" placeholder="Teléfono" id="telefono">
  <input type="text" placeholder="Ingresa tu número de referencia del pago" id="referencia">

  <button class="pay-btn yape" onclick="mostrar('yape')">Yape</button>
  <div class="pay-box" id="yape">
    📲 Yape<br>
    Número: +51 916 859 731<br>
    Titular: Angemar López
  </div>

  <button class="pay-btn pm" onclick="mostrar('pm')">Pago Móvil</button>
  <div class="pay-box" id="pm">
    📱 Pago Móvil<br>
    Cédula: 14487488<br>
    Teléfono: 0414-9910065<br>
    Banco: 0134 Banesco
  </div>

  <div class="total">Total a pagar: <span id="total">0</span></div>
  <button class="btn-whatsapp" onclick="enviarWhatsApp()">Comprar y enviar por WhatsApp</button>
</section>

<section id="top-compradores">
  <h3>Top de Compradores</h3>
  <ul id="lista-compradores"></ul>
</section>

<footer>
  © RifaResuelve — Todos los derechos reservados
</footer>

<a class="whatsapp" href="https://wa.me/584127962015" target="_blank">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
const ticketsTotales = 600;
let ticketsVendidos = 0;
let compradores = [];

function mostrar(id){
  document.getElementById("yape").style.display="none";
  document.getElementById("pm").style.display="none";
  document.getElementById(id).style.display="block";
}

function calcular(){
  const pais = document.getElementById("pais").value;
  const cantidad = parseInt(document.getElementById("cantidad").value);

  let precio = 0;
  let moneda = "";

  if(pais === "venezuela"){
    precio = 200;
    moneda = "Bs";
    mostrar("pm");
  } else if(pais === "peru"){
    precio = 6;
    moneda = "soles";
    mostrar("yape");
  }

  document.getElementById("total").innerText = precio * cantidad + " " + moneda;

  const porcentaje = ((ticketsVendidos / ticketsTotales) * 100).toFixed(2);
  document.getElementById("barra").style.width = porcentaje + "%";
  document.getElementById("porcentaje").innerText = porcentaje + "% vendidos";
}

function enviarWhatsApp(){
  const nombre = document.getElementById("nombre").value.trim();
  const dni = document.getElementById("dni").value.trim();
  const telefono = document.getElementById("telefono").value.trim();
  const referencia = document.getElementById("referencia").value.trim();
  const pais = document.getElementById("pais").value;
  const cantidad = parseInt(document.getElementById("cantidad").value);

  if(!nombre || !dni || !telefono || !referencia || !pais){
    alert("Por favor completa todos los campos incluyendo número de referencia.");
    return;
  }

  let metodo = pais === "peru" ? "Yape" : "Pago Móvil";
  let precio = pais === "peru" ? 6 : 200;
  let moneda = pais === "peru" ? "soles" : "Bs";
  const total = precio * cantidad;

  const mensaje = `Hola, compré ${cantidad} ticket(s) de RifaResuelve
Nombre: ${nombre}
Cédula/DNI: ${dni}
Teléfono: ${telefono}
País: ${pais}
Método de pago: ${metodo}
Monto: ${total} ${moneda}
Número de referencia: ${referencia}`;

  window.open("https://wa.me/584127962015?text=" + encodeURIComponent(mensaje), "_blank");

  ticketsVendidos += cantidad;
  calcular();
  guardarComprador(nombre, cantidad);

  document.getElementById("pais").value="";
  document.getElementById("cantidad").value="1";
  document.getElementById("nombre").value="";
  document.getElementById("dni").value="";
  document.getElementById("telefono").value="";
  document.getElementById("referencia").value="";
}

function guardarComprador(nombre, cantidad){
  const existing = compradores.find(c => c.nombre === nombre);
  if(existing){
    existing.tickets += cantidad;
  } else {
    compradores.push({nombre, tickets: cantidad});
  }
  actualizarTop();
}

function actualizarTop(){
  const lista = document.getElementById("lista-compradores");
  lista.innerHTML = "";
  compradores.sort((a,b) => b.tickets - a.tickets);
  compradores.slice(0,5).forEach(c => {
    const li = document.createElement("li");
    li.textContent = `${c.nombre} — ${c.tickets} tickets`;
    lista.appendChild(li);
  });
}

calcular();
</script>

</body>
</html>
