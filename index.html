<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RifaResuelve 1.0 — Compra de tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
  :root{
    --azul:#0b2545;
    --amarillo:#f0c330;
    --blanco:#ffffff;
    --gris:#f4f6fa;
    --verde:#28a745;
  }
  body{
    margin:0;font-family:Inter,Arial;background:var(--azul);color:#fff;
  }
  .container{max-width:980px;margin:28px auto;padding:22px;}

  header{display:flex;align-items:center;gap:20px}
  header img.logo{width:80px;height:80px;background:#fff;padding:6px;border-radius:10px}
  header h1{margin:0;font-size:22px}

  .card{
    background:rgba(255,255,255,0.06);
    padding:18px;border-radius:14px;margin-top:18px;
  }

  .row{display:flex;gap:12px;flex-wrap:wrap}
  label{font-size:14px;color:#e6eefc}
  input,select{
    width:100%;padding:10px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.05);
    color:#fff;
  }

  .price-badge{
    background:var(--amarillo);color:#0b2545;padding:8px 12px;
    border-radius:10px;font-weight:700;display:inline-block;
  }

  .pay-details{margin-top:6px;padding:10px;border-radius:8px;background:rgba(255,255,255,0.05)}

  .total{font-size:24px;font-weight:700;margin-top:10px}

  .buy-btn{
    margin-top:14px;padding:12px 18px;border-radius:10px;border:0;
    background:linear-gradient(90deg,#ffcf3f,#ff9c00);color:#081426;
    font-weight:800;cursor:pointer;font-size:16px;
  }
  .buy-btn[disabled]{opacity:.4;cursor:not-allowed}

  .progress-wrap{margin-top:20px}
  .progress{height:20px;background:rgba(255,255,255,0.15);border-radius:12px;overflow:hidden}
  .progress div{height:100%;width:0;background:linear-gradient(90deg,#ffe08a,#ffbb00)}

  .ref-box{
    margin-top:14px;background:rgba(255,255,255,0.07);
    padding:10px;border-radius:10px;font-size:17px;font-weight:bold;display:none;
  }

  footer{margin-top:22px;color:#cfe0ff;font-size:14px}

  .invisible-admin{
    opacity:0.02;position:fixed;right:10px;bottom:10px;width:55px;height:55px;
    background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }

  @media(max-width:600px){
    .row{flex-direction:column}
  }
</style>
</head>
<body>

<div class="container">

<header>
  <img class="logo" src="https://via.placeholder.com/150x150.png?text=LOGO">
  <div>
    <h1>RifaResuelve 1.0 — Premio $300</h1>
    <div style="font-size:13px;color:#dfefff">Compra tus tickets y participa.</div>
  </div>
</header>

<div class="card">

  <div class="row">
    <div style="flex:1">
      <label>País</label>
      <select id="country">
        <option value="peru">Perú</option>
        <option value="venezuela">Venezuela</option>
      </select>
    </div>

    <div style="flex:1">
      <label>Método de pago</label>
      <select id="payment">
        <option value="yape">Yape</option>
        <option value="pago-movil">Pago móvil</option>
      </select>
      <div class="pay-details" id="payDetails"></div>
    </div>
