<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve 1.0</title>
<style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
    .container { max-width: 500px; margin: 30px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
    h1 { text-align:center; }
    label { display:block; margin-top:10px; }
    input, select, button { width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
    .payment-info { display:none; margin-top:10px; padding:10px; background:#e9f5ff; border-radius:5px; }
    .verificador { margin-top:15px; padding:10px; background:#fff3cd; border-radius:5px; border:1px solid #ffeeba; }
    .btn-payment { margin-top:10px; cursor:pointer; background:#007bff; color:#fff; border:none; }
    .btn-send { margin-top:15px; background:#28a745; color:#fff; border:none; cursor:pointer; }
</style>
</head>
<body>

<div class="container" id="compradorContainer">
    <h1>Compra tus Tickets</h1>
    <label>Nombre y Apellido:</label>
    <input type="text" id="nombre" placeholder="Tu nombre completo" required>
    
    <label>Cédula / DNI:</label>
    <input type="text" id="cedula" placeholder="Tu documento" required>
    
    <label>Teléfono:</label>
    <input type="text" id="telefono" placeholder="Número de teléfono" required>
    
    <label>Cantidad de Tickets:</label>
    <select id="cantidad">
        <option value="1">1 Ticket</option>
        <option value="2">2 Tickets</option>
        <option value="3">3 Tickets</option>
        <option value="4">4 Tickets</option>
        <option value="5">5 Tickets</option>
    </select>
    
    <h3>Método de Pago</h3>
    <button class="btn-payment" onclick="mostrarPago('yape')">Yape</button>
    <button class="btn-payment" onclick="mostrarPago('pagoMovil')">Pago Móvil</button>
    
    <div class="payment-info" id="infoPago"></div>
    
    <div class="verificador" id="verificador">
        <label>Número de referencia de tu pago (obligatorio):</label>
        <input type="text" id="referencia" placeholder="Ingresa tu referencia">
    </div>
    
    <button class="btn-send" onclick="enviarWhatsApp()">Enviar al WhatsApp</button>
</div>

<div class="container" style="max-width:300px; margin-top:30px; text-align:center;">
    <button style="background:#6c757d; color:#fff; border:none; padding:10px; cursor:pointer;" onclick="abrirPanel()">Abrir Panel Administrativo</button>
</div>

<script>
// Datos de pago Yape
const yapeDatos = [
    {numero:"+51 916 859 731", titular:"Angemar López"}
];

function mostrarPago(metodo){
    let info = document.getElementById('infoPago');
    if(metodo === 'yape'){
        info.style.display='block';
        info.innerHTML = "<strong>YAPE</strong><br>";
        yapeDatos.forEach(d=>{
            info.innerHTML += `Número: ${d.numero}<br>Titular: ${d.titular}<br><br>`;
        });
        info.innerHTML += "Monto: Calculado según cantidad de tickets";
    } else {
        info.style.display='block';
        info.innerHTML = "<strong>Pago Móvil</strong><br>Información pendiente de agregar.";
    }
}

function enviarWhatsApp(){
    let nombre = document.getElementById('nombre').value.trim();
    let cedula = document.getElementById('cedula').value.trim();
    let telefono = document.getElementById('telefono').value.trim();
    let cantidad = document.getElementById('cantidad').value;
    let referencia = document.getElementById('referencia').value.trim();
    
    if(!nombre || !cedula || !telefono || !referencia){
        alert("Todos los campos son obligatorios, incluyendo el número de referencia.");
        return;
    }

    let mensaje = `¡Hola! Tengo una compra de tickets:\nNombre: ${nombre}\nCédula: ${cedula}\nTeléfono: ${telefono}\nTickets: ${cantidad}\nReferencia: ${referencia}`;
    
    let numeroWhatsApp = "+51921041484"; // Segundo número receptor de compras
    let url = `https://wa.me/${numeroWhatsApp.replace(/\D/g,'')}?text=${encodeURIComponent(mensaje)}`;
    window.open(url,'_blank');
}

// Abrir panel administrativo en otra pestaña
function abrirPanel(){
    let panelHTML = `
    <!DOCTYPE html>
    <html lang="es">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f4f4; margin:0; padding:0; }
        .container { max-width:800px; margin:50px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
        h1 { text-align:center; }
        input, button { padding:10px; margin:5px 0; width:100%; border-radius:5px; border:1px solid #ccc; }
        table { width:100%; border-collapse: collapse; margin-top:15px; }
        th, td { border:1px solid #ccc; padding:8px; text-align:center; }
        th { background:#007bff; color:#fff; }
        button.send-whatsapp { background:#28a745; color:#fff; border:none; cursor:pointer; }
    </style>
    </head>
    <body>
    <div class="container" id="loginContainer">
        <h1>Panel Administrativo</h1>
        <input type="password" id="clave" placeholder="Ingresa la contraseña">
        <button onclick="verificarClave()">Ingresar</button>
    </div>
    <div class="container" id="panel" style="display:none;">
        <h1>Gestión de Tickets</h1>
        <button onclick="generarTicket()">Generar Ticket</button>
        <table id="tablaTickets">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Cédula</th>
                    <th>Teléfono</th>
                    <th>Tickets Comprados</th>
                    <th>Enviar WhatsApp</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script>
        const contraseña = "rifa2025";
        let tickets = [];
        function verificarClave(){
            let clave = document.getElementById('clave').value;
            if(clave === contraseña){
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else {
                alert("Contraseña incorrecta.");
            }
        }
        function generarTicket(){
            let nombre = prompt("Nombre del comprador:");
            let apellido = prompt("Apellido del comprador:");
            let cedula = prompt("Cédula/DNI:");
            let telefono = prompt("Teléfono:");
            let cantidad = prompt("Cantidad de tickets:");
            if(nombre && apellido && cedula && telefono && cantidad){
                tickets.push({nombre, apellido, cedula, telefono, cantidad});
                actualizarTabla();
            } else {
                alert("Todos los campos son obligatorios.");
            }
        }
        function actualizarTabla(){
            let tbody = document.querySelector("#tablaTickets tbody");
            tbody.innerHTML = "";
            tickets.forEach((t,i)=>{
                let row = \`<tr>
                    <td>\${t.nombre}</td>
                    <td>\${t.apellido}</td>
                    <td>\${t.cedula}</td>
                    <td>\${t.telefono}</td>
                    <td>\${t.cantidad}</td>
                    <td><button class="send-whatsapp" onclick="enviarWhatsAppPanel(\${i})">Enviar</button></td>
                </tr>\`;
                tbody.innerHTML += row;
            });
        }
        function enviarWhatsAppPanel(index){
            let t = tickets[index];
            let mensaje = \`¡Hola! Tu compra de tickets:\nNombre: \${t.nombre} \${t.apellido}\nCédula: \${t.cedula}\nTeléfono: \${t.telefono}\nTickets: \${t.cantidad}\`;
            let numeroWhatsApp = "+51921041484"; // Segundo número receptor de compras
            let url = \`https://wa.me/\${numeroWhatsApp.replace(/\\D/g,'')}?text=\${encodeURIComponent(mensaje)}\`;
            window.open(url,'_blank');
        }
    </script>
    </body>
    </html>
    `;
    let w = window.open();
    w.document.write(panelHTML);
    w.document.close();
}
</script>
</body>
</html>
