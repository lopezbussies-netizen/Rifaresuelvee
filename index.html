<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve 1.0 – Premio oficial 300$</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body { font-family: Arial, sans-serif; background:#0a1d3c; color:#fff; margin:0; padding:0;}
header { text-align:center; padding:15px; background:#062140; }
header h1 { margin:0; color:#FFD700; }
.container { max-width:700px; margin:auto; padding:20px; }
.section { background:#FFD700; color:#0a1d3c; padding:20px; border-radius:8px; margin-bottom:20px; }
.section h2 { text-align:center; }
input, select { width:100%; padding:8px; margin:5px 0 15px 0; border-radius:5px; border:1px solid #ccc; }
button { width:100%; padding:10px; border:none; border-radius:5px; background:#062140; color:#FFD700; cursor:pointer; }
button:hover { background:#0a1d3c; }
.bar-container { background:#ccc; border-radius:20px; overflow:hidden; margin-top:10px;}
.bar { height:20px; background:#FFD700; width:0%; }
.social { display:flex; justify-content:center; gap:40px; margin-top:20px; font-size:35px; }
.datos-pago { display:none; padding:10px; background:#fff3b0; color:#0a1d3c; border-radius:5px; text-align:center; font-weight:bold;}
</style>
</head>
<body>

<header>
<h1>RifaResuelve 1.0 – Premio oficial 300$</h1>
</header>

<div class="container">

<!-- PÁGINA PÚBLICA -->
<div id="publico">

<div class="section">
<h2>Selecciona tus tickets</h2>
<select id="tickets">
<option value="1">1</option><option value="2">2</option><option value="3">3</option>
<option value="4">4</option><option value="5">5</option><option value="6">6</option>
<option value="7">7</option><option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>
</select>
</div>

<div class="section">
<h2>Datos Personales</h2>
<input type="text" id="nombre" placeholder="Nombre y Apellido">
<input type="text" id="cedula" placeholder="Cédula / DNI">
<input type="text" id="telefono" placeholder="Número de teléfono">
<input type="email" id="correo" placeholder="Correo electrónico">
<select id="pais">
<option value="venezuela">Venezuela</option>
<option value="peru">Perú</option>
</select>
</div>

<div class="section">
<h2>Método de Pago</h2>
<select id="metodo">
<option value="yape">Yape</option>
<option value="pago_movil">Pago Móvil</option>
</select>

<p id="costo">🇻🇪 150 Bs     🇵🇪 5 S/</p>
<p id="total">💰 Total a pagar: 150 Bs</p>

<!-- NUEVO CAMPO NÚMERO DE REFERENCIA -->
<input type="text" id="referencia" placeholder="Ingresa aquí tu número de referencia" style="margin-top:-5px;margin-bottom:15px;">

<div id="datosPago" class="datos-pago"></div>
</div>

<div class="section">
<label><input type="checkbox" id="terminos"> Acepto términos incondicionales</label>
<button id="comprar">Comprar y enviar a WhatsApp</button>
</div>

<div class="section">
<h2>Porcentaje de tickets vendidos</h2>
<div class="bar-container"><div class="bar" id="progressBar"></div></div>
</div>

<div class="section">
<h2>Verificador de Boletos</h2>
<input type="text" id="verificar" placeholder="Ingresa tu número de teléfono">
<p id="resultadoVerificador">Aquí se mostrará tu estado de tickets</p>
</div>

<div class="social">
<a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
<a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
</div>

<div class="section">
<h2>Centro de Ayuda</h2>
<input type="password" id="clavePanel" placeholder="Ingresa la clave del panel">
<button id="abrirPanel">Abrir Panel</button>
</div>

</div> <!-- FIN PUBLICO -->

<script>
const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const metodoSelect = document.getElementById('metodo');
const totalP = document.getElementById('total');
const datosPago = document.getElementById('datosPago');
const progressBar = document.getElementById('progressBar');
const verificarInput = document.getElementById('verificar');
const referenciaInput = document.getElementById('referencia');

let ticketsVendidos = 0;
const registros = {};

// ACTUALIZAR COSTO
function actualizarCosto(){
    const pais = paisSelect.value;
    const tickets = parseInt(ticketsSelect.value);
    const costoTicket = pais==='venezuela'?150:5;
    totalP.textContent = `💰 Total a pagar: ${costoTicket*tickets} ${pais==='venezuela'?'Bs':'S/'}`;
}
ticketsSelect.addEventListener('change', actualizarCosto);
paisSelect.addEventListener('change', actualizarCosto);

// DATOS DE PAGO
metodoSelect.addEventListener('change', () => {
    datosPago.style.display='block';
    datosPago.innerHTML = metodoSelect.value==='yape' ? 
        "Datos Yape:<br>📱 +51 916 859 731<br>Angemar López" :
        "Datos Pago Móvil:<br>📱 +58 414 1234567<br>Angemar López";
});

// COMPRAR
document.getElementById('comprar').addEventListener('click',()=>{
    if(ticketsVendidos>=600){ alert('Todos los tickets se han vendido'); return; }
    if(!document.getElementById('terminos').checked){ alert("Debes aceptar los términos"); return; }

    const nombre=document.getElementById('nombre').value;
    const cedula=document.getElementById('cedula').value;
    const telefono=document.getElementById('telefono').value;
    if(registros[telefono]){ alert("Este teléfono ya tiene tickets registrados"); return; }
    const correo=document.getElementById('correo').value;
    const pais=paisSelect.value;
    const metodo=metodoSelect.value;
    const tickets=parseInt(ticketsSelect.value);
    if(ticketsVendidos+tickets>600){ alert("No hay suficientes tickets disponibles"); return; }

    const referencia = referenciaInput.value.trim();
    if(!referencia){ alert("Ingresa tu número de referencia"); return; }

    const costoTicket=pais==='venezuela'?150:5;
    const total=costoTicket*tickets;

    // ENVÍO AL SEGUNDO NÚMERO
    const mensaje=`Hola, Mari. Compra de tickets:\nNombre: ${nombre}\nCédula: ${cedula}\nTel: ${telefono}\nCorreo: ${correo}\nPaís: ${pais}\nMétodo: ${metodo}\nTickets: ${tickets}\nTotal: ${total} ${pais==='venezuela'?'Bs':'S/'}\nNúmero de referencia: ${referencia}`;
    window.open(`https://wa.me/51921041484?text=${encodeURIComponent(mensaje)}`,"_blank");

    registros[telefono]={tickets,estado:'pendiente'};
    ticketsVendidos+=tickets;
    progressBar.style.width=(ticketsVendidos/600*100)+'%';
});

// VERIFICADOR
verificarInput.addEventListener('input', ()=>{
    const tel=verificarInput.value;
    if(registros[tel]){
        document.getElementById('resultadoVerificador').textContent=`Tienes ${registros[tel].tickets} tickets. Estado: ${registros[tel].estado}`;
    }else{
        document.getElementById('resultadoVerificador').textContent="No se encontraron tickets registrados.";
    }
});

// PANEL ADMIN / CENTRO DE AYUDA
document.getElementById('abrirPanel').addEventListener('click',()=>{
    const clave = document.getElementById('clavePanel').value;
    if(clave!=='rifa2025'){ alert("Contraseña incorrecta"); return; }

    const panel = window.open('','_blank');
    if(!panel){ alert("Permite ventanas emergentes en tu navegador"); return; }

    panel.document.title="Centro de Ayuda";
    panel.document.body.style.background="#0a1d3c";
    panel.document.body.style.color="#fff";
    panel.document.body.style.fontFamily="Arial";
    panel.document.body.style.padding="20px";

    panel.document.body.innerHTML=`
        <h1>Centro de Ayuda</h1>
        <div id="panelForm">
            <input type="text" id="adminNombre" placeholder="Nombre y Apellido">
            <input type="text" id="adminCedula" placeholder="Cédula / DNI">
            <input type="text" id="adminTelefono" placeholder="Teléfono del comprador">
            <input type="number" id="adminTickets" placeholder="Cantidad de tickets">
            <select id="adminEstado">
                <option value="pendiente">Pendiente</option>
                <option value="pagado">Pagado</option>
            </select>
            <input type="text" id="adminNumTicket" placeholder="Número de ticket" readonly>
            <button id="generarTicket">Generar Código de Tickets</button>
            <button id="enviarAdmin">Registrar Venta y Enviar Confirmación</button>
        </div>
        <p>Total tickets vendidos: <span id="totalVendidos">0</span>/600</p>
        <div class="bar-container"><div class="bar" id="progressBar" style="height:20px;background:#FFD700;width:0%;border-radius:20px;"></div></div>
        <table id="tablaVentas" border="1" style="border-collapse:collapse;margin-top:10px;width:100%;text-align:center;">
        <tr><th>Nombre</th><th>Cédula</th><th>Teléfono</th><th>Tickets</th><th>Estado</th><th>Número</th></tr>
        </table>
        <button id="pausarVenta" style="margin-top:10px;background:red;color:white;padding:8px;border:none;border-radius:5px;cursor:pointer;">Pausar Venta</button>
    `;

    let panelTicketsVendidos=0;
    let nextTicket=1;
    const panelRegistros={};
    let numerosGenerados = [];

    // GENERADOR DE CÓDIGOS
    panel.document.getElementById('generarTicket').addEventListener('click',()=>{
        const tickets = parseInt(panel.document.getElementById('adminTickets').value);
        if(!tickets){ alert("Ingresa la cantidad de tickets"); return; }
        numerosGenerados = [];
        for(let i=0;i<tickets;i++){
            numerosGenerados.push(String(nextTicket).padStart(3,'0'));
        }
        panel.document.getElementById('adminNumTicket').value = numerosGenerados.join(', ');
    });

    // REGISTRAR VENTA
    panel.document.getElementById('enviarAdmin').addEventListener('click',()=>{
        const nombre = panel.document.getElementById('adminNombre').value;
        const cedula = panel.document.getElementById('adminCedula').value;
        const telefono = panel.document.getElementById('adminTelefono').value;
        const tickets = parseInt(panel.document.getElementById('adminTickets').value);
        const estado = panel.document.getElementById('adminEstado').value;
        if(!nombre||!cedula||!telefono||!tickets){ alert("Completa todos los campos"); return; }
        if(panelRegistros[telefono]){ alert("Este teléfono ya tiene tickets"); return; }
        if(panelTicketsVendidos+tickets>600){ alert("No hay suficientes tickets"); return; }

        if(numerosGenerados.length!==tickets){
            alert("Genera primero los códigos de tickets");
            return;
        }

        numerosGenerados.forEach(numTicket=>{
            const fila = panel.document.getElementById('tablaVentas').insertRow();
            fila.insertCell(0).innerText=nombre;
            fila.insertCell(1).innerText=cedula;
            fila.insertCell(2).innerText=telefono;
            fila.insertCell(3).innerText=tickets;
            fila.insertCell(4).innerText=estado;
            fila.insertCell(5).innerText=numTicket;
            nextTicket++;
            panelTicketsVendidos++;
        });

        panelRegistros[telefono]={tickets,estado};
        panel.document.getElementById('totalVendidos').innerText=panelTicketsVendidos;
        panel.document.getElementById('progressBar').style.width=(panelTicketsVendidos/600*100)+'%';

        const mensaje=`Hola ${nombre}, tus tickets (${numerosGenerados.join(', ')}) han sido registrados. Estado: ${estado}`;
        window.open('https://wa.me/'+telefono+'?text='+encodeURIComponent(mensaje),'_blank');

        alert('Venta registrada y confirmación enviada correctamente');
        numerosGenerados = [];
        panel.document.getElementById('adminNumTicket').value = '';
        if(panelTicketsVendidos>=600){ alert('¡Se han vendido todos los tickets!'); }
    });

    panel.document.getElementById('pausarVenta').addEventListener('click',()=>{
        panelTicketsVendidos=600;
        panel.document.getElementById('progressBar').style.width='100%';
        panel.document.getElementById('totalVendidos').innerText=600;
        alert('Ventas pausadas manualmente');
    });
});
</script>

</body>
</html>
