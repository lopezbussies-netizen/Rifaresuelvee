<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Resuelve 1.0</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
        text-align: center;
    }

    /* Header: Logo y título */
    .header {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 20px;
        gap: 15px;
    }
    .header img.logo {
        width: 80px; /* tamaño del logo */
        height: auto;
        border-radius: 8px;
    }
    .header h1 {
        font-size: 28px;
        margin: 0;
        color: #333;
    }

    /* Flyer centrado */
    .flyer-container {
        margin-top: 30px;
        text-align: center;
    }
    .flyer-container img {
        max-width: 90%;
        width: 350px; /* tamaño del flyer */
        border-radius: 10px;
    }

    /* Centro de ayuda discreto */
    .soporte-container {
        margin-top: 30px;
        text-align: center;
    }
    .soporte-container input {
        padding: 8px 12px;
        font-size: 16px;
        width: 200px;
        border-radius: 5px;
        border: 1px solid #ccc;
        text-align: center;
    }
    .soporte-container button {
        padding: 8px 15px;
        font-size: 16px;
        border-radius: 5px;
        border: none;
        background-color: #28a745;
        color: white;
        cursor: pointer;
        margin-left: 5px;
    }
    .soporte-container button:hover {
        background-color: #218838;
    }

    @media(max-width:600px){
        .header {
            flex-direction: column;
        }
        .header img.logo {
            width: 60px;
        }
        .header h1 {
            font-size: 24px;
        }
        .flyer-container img {
            width: 90%;
        }
        .soporte-container input {
            width: 150px;
            margin-bottom: 10px;
        }
        .soporte-container button {
            margin-left: 0;
        }
    }
</style>
</head>
<body>

<!-- Logo y título -->
<div class="header">
    <img src="https://i.imgur.com/EbxVPFl.png" alt="Logo Rifa" class="logo">
    <h1>🎉 GRAN RIFA 2025 🎉</h1>
</div>

<!-- Flyer centrado -->
<div class="flyer-container">
    <img src="URL_DEL_FLYER_AQUI" alt="Flyer de la rifa">
</div>

<!-- Centro de ayuda (panel discreto) -->
<div class="soporte-container">
    <input type="password" placeholder="" id="codigoSoporte">
    <button onclick="accederSoporte()">Acceder</button>
</div>

<script>
function accederSoporte() {
    // Aquí tú ingresas la clave manualmente en el script si quieres validar
    let codigoIngresado = document.getElementById('codigoSoporte').value;
    // Por ahora dejamos vacío, tú puedes validar luego con tu clave
    if(codigoIngresado === "TU_CLAVE_AQUI") {
        window.open("panel_admin.html","_blank"); // abrir panel en nueva pestaña
    } else {
        alert("Código incorrecto");
    }
}
</script>

</body>
</html>
