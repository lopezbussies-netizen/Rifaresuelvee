<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RifaResuelve 1.0 — RIFARESUELVE #1</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
body { font-family: Arial, sans-serif; background:#0a1d3c; color:#fff; margin:0; padding:0;}
header { background:#062140; padding:15px; text-align:center; }
header .header-inner { display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; }
header img.logo { width:80px; border-radius:8px; }
header h1 { margin:0; color:#FFD700; font-size:1.6em; text-align:center; }

.container { max-width:900px; margin:auto; padding:20px; }
.flyer-container { text-align:center; margin-bottom:30px; }
.flyer-container img { max-width:90%; width:320px; border-radius:10px; }

.section { background:#FFD700; color:#0a1d3c; padding:20px; border-radius:8px; margin-bottom:20px; }
.section h2 { text-align:center; }

input, select, button, textarea { width:100%; padding:8px; margin:5px 0 12px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; box-sizing:border-box; }
button { background:#062140; color:#FFD700; cursor:pointer; border:none; }
button:hover { background:#0a1d3c; }

.payment-buttons { display:flex; justify-content:center; gap:15px; margin-bottom:15px; flex-wrap:wrap; }
.payment-buttons button { width:auto; padding:10px 20px; }

.datos-pago { display:none; padding:10px; background:#fff3b0; color:#0a1d3c; border-radius:5px; text-align:center; font-weight:bold; margin-bottom:10px; }

.small { font-size:0.9em; color:#062140; }

.social { display:flex; justify-content:center; gap:40px; margin-top:20px; font-size:35px; }

#total { font-weight:bold; text-align:center; margin-top:10px; }

@media(max-width:820px){
  .container{padding:12px}
  header img.logo{width:60px}
  .flyer-container img{width:90%}
}

</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="https://i.imgur.com/EbxVPFl.png" alt="Logo Rifa" class="logo">
    <h1>🎉 RIFARESUELVE #1 🎉</h1>
  </div>
</header>

<div class="container">

  <div class="flyer-container">
    <img src="https://i.imgur.com/171k5yi.png" alt="Flyer de la rifa">
  </div>

  <div id="publico">

    <div class="section">
      <h2>Selecciona tus tickets</h2>
      <select id="tickets">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="section">
      <h2>Datos Personales</h2>
      <input type="text" id="nombre" placeholder="Nombre y Apellido">
      <input type="text" id="cedula" placeholder="Cédula / DNI">
      <input type="text" id="telefono" placeholder="Número de teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <select id="pais">
        <option value="" disabled selected>Selecciona tu país</option>
        <option value="venezuela">Venezuela</option>
        <option value="peru">Perú</option>
      </select>
    </div>

    <div class="section">
      <h2>Método de Pago</h2>
      <div class="payment-buttons">
        <button type="button" id="btnYape">Yape</button>
        <button type="button" id="btnPagoMovil">Pago Móvil</button>
      </div>

      <div id="datosPago" class="datos-pago"></div>

      <div id="refContainer">
        <label class="small">Ingresa tu número de referencia del pago (obligatorio)</label>
        <input type="text" id="refPago" placeholder="Número de referencia">
      </div>

      <p id="total">💰 Total a pagar: 0</p>
    </div>

    <div class="section">
      <label><input type="checkbox" id="terminos"> Acepto términos incondicionales</label>
      <button id="comprar">Comprar y enviar a WhatsApp</button>
    </div>

    <div class="social">
      <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com/share/1D5m9zyG9n/?mibextid=wwXIfr" target="_blank"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://wa.me/584127962015" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
    </div>

  </div>
</div>

<script>
const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const totalP = document.getElementById('total');
const datosPagoDiv = document.getElementById('datosPago');
const refContainer = document.getElementById('refContainer');
const refPago = document.getElementById('refPago');
const btnYape = document.getElementById('btnYape');
const btnPagoMovil = document.getElementById('btnPagoMovil');
const comprarBtn = document.getElementById('comprar');

let metodoSeleccionado = null;

function actualizarCosto(){
  const tickets = parseInt(ticketsSelect.value);
  const pais = paisSelect.value;
  if(!pais || !metodoSeleccionado){
    totalP.textContent = '💰 Total a pagar: 0';
    return;
  }
  let costo = 0;
  if(metodoSeleccionado==='yape' && pais==='peru') costo = tickets*5;
  if(metodoSeleccionado==='pago_movil' && pais==='venezuela') costo = tickets*150;
  totalP.textContent = `💰 Total a pagar: ${costo} ${pais==='venezuela'?'Bs':'S/'}`;
}

ticketsSelect.addEventListener('change', actualizarCosto);
paisSelect.addEventListener('change', actualizarCosto);

btnYape.addEventListener('click', ()=>{
  metodoSeleccionado='yape';
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = "Yape:<br>📱 +51 916 859 731<br>Titular: Angemar López";
  actualizarCosto();
});

btnPagoMovil.addEventListener('click', ()=>{
  metodoSeleccionado='pago_movil';
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = "Pago Móvil:<br>Cédula: 14487488<br>Teléfono: 04149910065<br>Banco: 0134 (Banesco)";
  actualizarCosto();
});

comprarBtn.addEventListener('click', ()=>{
  const nombre = document.getElementById('nombre').value.trim();
  const cedula = document.getElementById('cedula').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const pais = paisSelect.value;
  const tickets = parseInt(ticketsSelect.value);
  const refVal = refPago.value.trim();

  if(!nombre || !telefono){ alert('Completa nombre y teléfono'); return; }
  if(!pais){ alert('Selecciona tu país'); return; }
  if(!metodoSeleccionado){ alert('Selecciona un método de pago'); return; }
  if(!refVal){ alert('Ingresa tu número de referencia'); return; }
  if(!document.getElementById('terminos').checked){ alert('Debes aceptar los términos'); return; }

  const costoTicket = pais==='venezuela'?150:5;
  const total = tickets*costoTicket;

  const mensaje = `📌 COMPRA DE TICKETS – RifaResuelve #1

👤 Nombre: ${nombre}
🆔 Cédula / DNI: ${cedula}
📞 Teléfono: ${telefono}
📧 Correo: ${correo}
🌍 País: ${pais}

🎟 Cantidad de tickets: ${tickets}
💵 Total pagado: ${total} ${pais==='venezuela'?'Bs':'S/'}
🧾 Referencia de pago: ${refVal}

📅 Fecha de compra: ${new Date().toLocaleDateString()}

Adjunto comprobante de pago para validación.`;

  window.open(`https://wa.me/584127962015?text=${encodeURIComponent(mensaje)}`,'_blank');
  alert('WhatsApp abierto. Por favor envía el mensaje y registra la venta manualmente.');
});
</script>

</body>
</html>
