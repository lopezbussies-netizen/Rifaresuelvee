<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve 1.0 — Compra de tickets</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  :root{
    --bg:#0a1d3c;
    --accent:#FFD700;
    --card:#fff;
    --card-text:#0a1d3c;
    --input-bg:#FFD700;
    --input-text:#0a1d3c;
    --muted:#6b7280;
  }
  html,body{
    height:100%;
    margin:0;
    font-family:Inter,Segoe UI,Arial,sans-serif;
    background:var(--bg);
    color:#fff;
  }
  .wrap{max-width:920px;margin:18px auto;padding:18px;}
  header{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px;border-radius:10px;background:#062140;}
  header h1{margin:0;font-size:1.15rem;color:var(--accent);}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:16px;}
  @media(max-width:880px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);color:var(--card-text);padding:16px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.25);}
  label{font-weight:600;display:block;margin-bottom:6px;}
  input[type="text"], input[type="email"], input[type="number"], select{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #d1d5db;
    font-size:0.95rem;
    box-sizing:border-box;
    background: var(--input-bg);
    color: var(--input-text);
  }
  .small{font-size:0.9rem;color:var(--muted);margin-top:6px;}
  .inline{display:flex;gap:8px;align-items:center;}
  button.primary{background:#062140;color:var(--accent);border:none;padding:12px;border-radius:8px;cursor:pointer;font-weight:700;}
  button.ghost{background:transparent;color:#062140;border:2px solid #062140;padding:8px;border-radius:8px;cursor:pointer;}
  .bar-container{background:#e5e7eb;border-radius:999px;overflow:hidden;height:18px;margin-top:12px;}
  .bar{height:100%;background:var(--accent);width:0%;}
  .flex-between{display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .copy-btn{background:#062140;color:var(--accent);border:none;padding:8px;border-radius:6px;cursor:pointer;}
  .muted{color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>RifaResuelve 1.0 — Premio oficial $300</h1>
  </header>

  <div class="grid">
    <!-- FORM -->
    <div class="card">
      <h2 style="margin-top:0;color:#062140">Compra tus tickets</h2>

      <div>
        <label for="tickets">Selecciona cantidad de tickets</label>
        <select id="tickets">
          ${[...Array(10)].map((_,i)=>`<option value="${i+1}">${i+1} ticket${i+1>1?'s':''}</option>`).join('')}
        </select>
      </div>

      <div style="margin-top:12px">
        <label>Datos personales</label>
        <input type="text" id="nombre" placeholder="Nombre y Apellido" />
        <input type="text" id="cedula" placeholder="Cédula / DNI" style="margin-top:8px" />
        <input type="text" id="telefono" placeholder="Número de teléfono" style="margin-top:8px" />
        <input type="email" id="correo" placeholder="Correo electrónico (opcional)" style="margin-top:8px" />
      </div>

      <div style="margin-top:12px">
        <label>País</label>
        <select id="pais">
          <option value="venezuela">Venezuela</option>
          <option value="peru">Perú</option>
        </select>
      </div>

      <div style="margin-top:12px">
        <label>Método de pago</label>
        <select id="metodo">
          <option value="">-- Selecciona --</option>
          <option value="yape">Yape</option>
          <option value="pago_movil">Pago Móvil</option>
        </select>
      </div>

      <div style="margin-top:12px">
        <label for="referencia">Número de referencia</label>
        <input type="text" id="referencia" placeholder="Ingresa tu número de referencia" />
      </div>

      <div style="margin-top:14px">
        <div style="display:flex;gap:10px;margin-top:12px">
          <button id="comprar" class="primary">Comprar y enviar a WhatsApp</button>
          <button id="limpiar" class="ghost">Limpiar</button>
        </div>
      </div>
    </div>

    <!-- PROGRESO / PANEL -->
    <div>
      <div class="card">
        <h3 style="margin:0 0 8px 0;color:#062140">Porcentaje de tickets vendidos</h3>
        <div class="bar-container">
          <div id="progressBar" class="bar"></div>
        </div>
      </div>

      <div class="card" style="margin-top:12px">
        <input type="password" id="clavePanel" placeholder="Clave panel" />
        <button id="abrirPanel" class="primary" style="margin-top:8px;width:100%">Abrir Panel</button>
      </div>
    </div>
  </div>
</div>

<script>
const WA_RECEIVER = "51921041484";
const MAX_TICKETS = 600;

const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const metodoSelect = document.getElementById('metodo');
const totalEl = document.getElementById('referencia');
const comprarBtn = document.getElementById('comprar');
const limpiarBtn = document.getElementById('limpiar');
const progressBar = document.getElementById('progressBar');

let ticketsVendidos = 0;

function actualizarCosto(){}

function prepararYEnviarWhatsApp(){
  const nombre = document.getElementById('nombre').value.trim();
  const cedula = document.getElementById('cedula').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const pais = paisSelect.value;
  const metodo = metodoSelect.value;
  const tickets = parseInt(ticketsSelect.value,10);
  const referencia = document.getElementById('referencia').value.trim();
  if(!nombre || !cedula || !telefono || !metodo || !referencia){ alert('Completa todos los campos'); return; }

  const mensaje = [
    'Nueva compra — RifaResuelve',
    `Nombre: ${nombre}`,
    `Cédula: ${cedula}`,
    `Teléfono: ${telefono}`,
    `País: ${pais}`,
    `Método: ${metodo}`,
    `Tickets: ${tickets}`,
    `Número de referencia: ${referencia}`
  ].join('\\n');

  window.open(`https://wa.me/${WA_RECEIVER}?text=${encodeURIComponent(mensaje)}`, '_blank');

  ticketsVendidos += tickets;
  updateProgressUI();
}

function updateProgressUI(){
  const pct = Math.min(100, (ticketsVendidos / MAX_TICKETS) * 100);
  progressBar.style.width = pct + '%';
}

comprarBtn.addEventListener('click', prepararYEnviarWhatsApp);

limpiarBtn.addEventListener('click', ()=>{
  document.getElementById('nombre').value='';
  document.getElementById('cedula').value='';
  document.getElementById('telefono').value='';
  document.getElementById('correo').value='';
  document.getElementById('referencia').value='';
  metodoSelect.value='';
  ticketsSelect.value='1';
});

document.getElementById('abrirPanel').addEventListener('click', ()=>{
  const clave = document.getElementById('clavePanel').value;
  if(clave !== 'mari1619'){ alert('Clave incorrecta'); return; }
  window.open('panel.html','_blank');
});

</script>
</body>
</html>
