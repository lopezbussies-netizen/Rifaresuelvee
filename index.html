<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RifaResuelve 1.0 — RIFARESUELVE #1</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0d1b2a, #1b263b);
    color: #fff;
    overflow-x: hidden;
}
header {
    text-align: center;
    padding: 20px;
}
h1 {
    font-size: 2em;
    margin-bottom: 10px;
}
.flyer {
    display: block;
    margin: 0 auto;
    max-width: 90%;
    border-radius: 15px;
}
.container {
    max-width: 500px;
    margin: 30px auto;
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(255,255,255,0.1);
}
input, select, button {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 1em;
}
button {
    background-color: #ff6b6b;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    background-color: #ff4757;
}
.payment-info {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    display: none;
}
#whatsapp {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 20px;
}
#whatsapp i {
    margin-right: 10px;
    color: #25D366;
}
.snowflake {
    position: fixed;
    top: -10px;
    color: #fff;
    font-size: 1em;
    z-index: 9999;
    user-select: none;
    pointer-events: none;
    animation-name: fall;
    animation-duration: 10s;
    animation-iteration-count: infinite;
    animation-timing-function: linear;
}
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<header>
    <h1>🎉 RifaResuelve 1.0 — Premio oficial 300$ 🎉</h1>
    <img src="flyer-actualizado.jpg" alt="Flyer Rifa" class="flyer" />
</header>

<div class="container">
    <label for="name">Nombre completo:</label>
    <input type="text" id="name" placeholder="Ej: Juan Pérez" required />

    <label for="id">Cédula / DNI:</label>
    <input type="text" id="id" placeholder="Ej: 12345678" required />

    <label for="phone">Teléfono:</label>
    <input type="text" id="phone" placeholder="Ej: +58 412-1234567" required />

    <label for="tickets">Cantidad de tickets:</label>
    <select id="tickets">
        <option value="1">1 ticket</option>
        <option value="2">2 tickets</option>
        <option value="3">3 tickets</option>
        <option value="4">4 tickets</option>
        <option value="5">5 tickets</option>
        <option value="6">6 tickets</option>
        <option value="7">7 tickets</option>
        <option value="8">8 tickets</option>
        <option value="9">9 tickets</option>
        <option value="10">10 tickets</option>
    </select>

    <label for="reference">Número de referencia:</label>
    <input type="text" id="reference" placeholder="Número de referencia obligatorio" required />

    <button id="yapeBtn">Pago Yape</button>
    <button id="pmBtn">Pago Móvil</button>

    <div class="payment-info" id="yapeInfo">
        <p>Yape: +51 916 859 731 (Titular: Angemar López)</p>
    </div>

    <div class="payment-info" id="pmInfo">
        <p>Pago móvil:</p>
        <ul>
            <li>Cédula: 14487488</li>
            <li>Teléfono: 04149910065</li>
            <li>Banco: 0134 (Banesco)</li>
        </ul>
    </div>

    <div id="whatsapp">
        <i class="fab fa-whatsapp fa-2x"></i>
        <span>+58 412-7962015</span>
    </div>
</div>

<!-- Animación de nieve -->
<script>
const snowCount = 50;
for (let i = 0; i < snowCount; i++) {
    const snow = document.createElement('div');
    snow.className = 'snowflake';
    snow.style.left = Math.random() * 100 + 'vw';
    snow.style.fontSize = (Math.random() * 10 + 10) + 'px';
    snow.style.animationDuration = (Math.random() * 5 + 5) + 's';
    snow.innerHTML = '❄';
    document.body.appendChild(snow);
}

// Botones de pago
document.getElementById('yapeBtn').addEventListener('click', () => {
    document.getElementById('yapeInfo').style.display = 'block';
    document.getElementById('pmInfo').style.display = 'none';
});
document.getElementById('pmBtn').addEventListener('click', () => {
    document.getElementById('pmInfo').style.display = 'block';
    document.getElementById('yapeInfo').style.display = 'none';
});
</script>

</body>
</html>
