<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RifaResuelve 1.0</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #0a1d3c;
        color: #fff;
        margin: 0;
        padding: 0;
    }
    header {
        display: flex;
        align-items: center;
        padding: 10px 20px;
        background-color: #062140;
    }
    header img {
        width: 80px;
        height: auto;
        margin-right: 20px;
    }
    header h1 {
        flex: 1;
        text-align: center;
        margin: 0;
        font-size: 24px;
        color: #FFD700;
    }
    header p {
        margin: 0;
        font-size: 18px;
        color: #FFD700;
    }
    .container {
        padding: 20px;
    }
    .section {
        background-color: #FFD700;
        color: #0a1d3c;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    .section h2 {
        margin-top: 0;
    }
    input, select {
        width: 100%;
        padding: 8px;
        margin: 5px 0 15px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
        box-sizing: border-box;
    }
    button {
        background-color: #062140;
        color: #FFD700;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
    }
    button:hover {
        background-color: #0a1d3c;
    }
    .bar-container {
        background-color: #ccc;
        border-radius: 20px;
        overflow: hidden;
        margin-top: 10px;
    }
    .bar {
        height: 20px;
        background-color: #FFD700;
        width: 0%;
    }
    .social {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 20px;
    }
    .social a {
        color: #FFD700;
        font-size: 24px;
        text-decoration: none;
    }
</style>
</head>
<body>

<header>
    <img src="logo.png" alt="Logo RifaResuelve">
    <h1>RifaResuelve 1.0</h1>
</header>

<div class="container">

    <!-- Selección de tickets -->
    <div class="section">
        <h2>Selecciona tus tickets</h2>
        <label for="tickets">Elige cuántos tickets quieres comprar (1 a 10):</label>
        <select id="tickets">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
        </select>
    </div>

    <!-- Datos personales -->
    <div class="section">
        <h2>Datos Personales</h2>
        <input type="text" id="nombre" placeholder="Nombre y Apellido">
        <input type="text" id="cedula" placeholder="Cédula o DNI">
        <input type="text" id="telefono" placeholder="Número de teléfono">
        <input type="email" id="correo" placeholder="Correo electrónico">
        <label for="pais">País:</label>
        <select id="pais">
            <option value="venezuela">Venezuela</option>
            <option value="peru">Perú</option>
        </select>
    </div>

    <!-- Método de pago -->
    <div class="section">
        <h2>Método de Pago</h2>
        <label for="metodo">Selecciona el método de pago:</label>
        <select id="metodo">
            <option value="yape">Yape</option>
            <option value="pago_movil">Pago Móvil</option>
        </select>

        <p id="costo">💰 Costo por ticket: 150 Bs / 5 S/</p>
        <p id="total">💰 Total a pagar: 150 Bs</p>
    </div>

    <!-- Términos y compra -->
    <div class="section">
        <input type="checkbox" id="terminos"> Acepto términos incondicionales
        <button id="comprar">Comprar y enviar a WhatsApp</button>
    </div>

    <!-- Barra de porcentaje -->
    <div class="section">
        <h2>Porcentaje de tickets vendidos</h2>
        <div class="bar-container">
            <div class="bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Redes sociales -->
    <div class="social">
        <a href="https://www.instagram.com" target="_blank">Instagram</a>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
    </div>

</div>

<script>
