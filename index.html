<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RifaResuelve 1.0 — Premio oficial 300$</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  body { font-family: Arial, sans-serif; background:#0a1d3c; color:#fff; margin:0; padding:0;}
  header { background:#062140; padding:15px; text-align:center; }
  header .header-inner { display:flex; align-items:center; justify-content:center; gap:15px; flex-wrap:wrap; }
  header img.logo { width:80px; border-radius:8px; }
  header h1 { margin:0; color:#FFD700; font-size:1.6em; text-align:center; }

  .container { max-width:900px; margin:auto; padding:20px; }
  .flyer-container { text-align:center; margin-bottom:30px; }
  .flyer-container img { max-width:90%; width:320px; border-radius:10px; }

  .section { background:#FFD700; color:#0a1d3c; padding:20px; border-radius:8px; margin-bottom:20px; }
  .section h2 { text-align:center; }

  input, select, button, textarea { width:100%; padding:8px; margin:5px 0 12px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; box-sizing:border-box; }
  button { background:#062140; color:#FFD700; cursor:pointer; border:none; }
  button:hover { background:#0a1d3c; }

  .bar-container { background:#ccc; border-radius:20px; overflow:hidden; margin-top:10px; }
  .bar { height:22px; background:#FFD700; width:0%; transition: width 0.5s; }

  .social { display:flex; justify-content:center; gap:40px; margin-top:20px; font-size:35px; }

  .datos-pago { display:none; padding:10px; background:#fff3b0; color:#0a1d3c; border-radius:5px; text-align:center; font-weight:bold; }

  .payment-buttons { display:flex; justify-content:center; gap:15px; margin-bottom:15px; flex-wrap:wrap; }
  .payment-buttons button { width:auto; padding:10px 20px; }

  .small { font-size:0.9em; color:#062140; }

  @media(max-width:820px){
    .container{padding:12px}
    header img.logo{width:60px}
    .flyer-container img{width:90%}
  }

  .panel-btn { background:#FFD700; color:#0a1d3c; padding:10px 14px; border-radius:6px; font-weight:bold; cursor:pointer; border:none; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="https://i.imgur.com/EbxVPFl.png" alt="Logo Rifa" class="logo">
    <h1>🎉 RifaResuelve 1.0 – Premio oficial 300$ 🎉</h1>
  </div>
</header>

<div class="container">

  <div class="flyer-container">
    <img src="https://i.imgur.com/XeDhygR.png" alt="Flyer de la rifa">
  </div>

  <div id="publico">

    <div class="section">
      <h2>Selecciona tus tickets</h2>
      <select id="tickets">
        <option value="1">1</option><option value="2">2</option><option value="3">3</option>
        <option value="4">4</option><option value="5">5</option><option value="6">6</option>
        <option value="7">7</option><option value="8">8</option><option value="9">9</option>
        <option value="10">10</option>
      </select>
    </div>

    <div class="section">
      <h2>Datos Personales</h2>
      <input type="text" id="nombre" placeholder="Nombre y Apellido">
      <input type="text" id="cedula" placeholder="Cédula / DNI">
      <input type="text" id="telefono" placeholder="Número de teléfono">
      <input type="email" id="correo" placeholder="Correo electrónico">
      <select id="pais">
        <option value="venezuela">Venezuela</option>
        <option value="peru">Perú</option>
      </select>
    </div>

    <div class="section">
      <h2>Método de Pago</h2>
      <div class="payment-buttons">
        <button type="button" id="btnYape">Yape</button>
        <button type="button" id="btnPagoMovil">Pago Móvil</button>
      </div>

      <div id="datosPago" class="datos-pago"></div>

      <div id="refContainer" style="display:none;">
        <label class="small">Ingresa tu número de referencia del pago (obligatorio)</label>
        <input type="text" id="refPago" placeholder="Número de referencia">
      </div>

      <p id="total">💰 Total a pagar: 0</p>
    </div>

    <div class="section">
      <label><input type="checkbox" id="terminos"> Acepto términos incondicionales</label>
      <button id="comprar">Comprar y enviar a WhatsApp</button>
      <p id="compraMensaje" class="small" style="display:none;color:#fff;background:#d9534f;padding:8px;border-radius:6px;margin-top:10px;"></p>
    </div>

    <div class="social">
      <a href="https://www.instagram.com" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a href="https://www.facebook.com" target="_blank"><i class="fa-brands fa-facebook"></i></a>
    </div>

    <div style="text-align:center;margin-top:18px;">
      <button id="btnSoporte" class="panel-btn">Centro de ayuda (Panel Administrativo)</button>
    </div>

  </div>

</div>

<script>
/* ------------------------- CONFIG ------------------------- */
const WHATSAPP_NUMBER = '51921041484'; // tu número para recibir todos los mensajes
const YAPE_NUMBER = '+51916859731';
const PAGOMOVIL_NUMBER = '+584149910065';

/* ------------------------- ELEMENTOS ------------------------- */
const ticketsSelect = document.getElementById('tickets');
const paisSelect = document.getElementById('pais');
const totalP = document.getElementById('total');
const datosPagoDiv = document.getElementById('datosPago');
const btnYape = document.getElementById('btnYape');
const btnPagoMovil = document.getElementById('btnPagoMovil');
const refContainer = document.getElementById('refContainer');
const refPago = document.getElementById('refPago');
const comprarBtn = document.getElementById('comprar');

/* ------------------------- FUNCIONES ------------------------- */
let metodoSeleccionado = null;

function actualizarCosto(){
  const tickets = parseInt(ticketsSelect.value);
  let costo = 0;
  if(!metodoSeleccionado) { totalP.textContent = `💰 Total a pagar: 0`; return; }
  if(paisSelect.value==='venezuela' && metodoSeleccionado==='pago_movil') costo = tickets*150;
  if(paisSelect.value==='peru' && metodoSeleccionado==='yape') costo = tickets*5;
  totalP.textContent = `💰 Total a pagar: ${costo} ${paisSelect.value==='venezuela'?'Bs':'S/'}`;
}
ticketsSelect.addEventListener('change', actualizarCosto);
paisSelect.addEventListener('change', actualizarCosto);

/* ------------------------- BOTONES PAGO ------------------------- */
btnYape.addEventListener('click', ()=>{
  metodoSeleccionado = 'yape';
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = `Datos Yape:<br>📱 ${YAPE_NUMBER}<br>Angemar López<br><span class="small">Número copiado al portapapeles</span>`;
  refContainer.style.display = 'block';
  navigator.clipboard.writeText(YAPE_NUMBER).catch(()=>{});
  actualizarCosto();
});
btnPagoMovil.addEventListener('click', ()=>{
  metodoSeleccionado = 'pago_movil';
  datosPagoDiv.style.display='block';
  datosPagoDiv.innerHTML = `Datos Pago Móvil:<br>📱 ${PAGOMOVIL_NUMBER}<br>Cédula: 14487488<br>Banco: Banesco (0134)<br><span class="small">Número copiado al portapapeles</span>`;
  refContainer.style.display = 'block';
  navigator.clipboard.writeText(PAGOMOVIL_NUMBER).catch(()=>{});
  actualizarCosto();
});

/* ------------------------- COMPRAR ------------------------- */
comprarBtn.addEventListener('click', ()=>{
  const nombre = document.getElementById('nombre').value.trim();
  const cedula = document.getElementById('cedula').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  const correo = document.getElementById('correo').value.trim();
  const tickets = parseInt(ticketsSelect.value);
  const pais = paisSelect.value;
  const ref = refPago.value.trim();

  if(!nombre){ alert('Por favor ingresa tu nombre completo'); return; }
  if(!cedula){ alert('Por favor ingresa tu Cédula / DNI'); return; }
  if(!telefono){ alert('Por favor ingresa tu teléfono'); return; }
  if(!metodoSeleccionado){ alert('Selecciona un método de pago'); return; }
  if(!ref){ alert('Ingresa tu número de referencia del pago'); return; }
  if(!document.getElementById('terminos').checked){ alert('Debes aceptar los términos'); return; }

  let total = 0;
  if(pais==='venezuela' && metodoSeleccionado==='pago_movil') total = tickets*150;
  if(pais==='peru' && metodoSeleccionado==='yape') total = tickets*5;

  const mensaje = `Nueva compra — RifaResuelve\n\nNombre: ${nombre}\nCédula/DNI: ${cedula}\nTeléfono: ${telefono}\nCorreo: ${correo}\nPaís: ${pais}\nTickets: ${tickets}\nTotal: ${total} ${pais==='venezuela'?'Bs':'S/'}\nReferencia: ${ref}`;

  const waPhone = WHATSAPP_NUMBER.replace(/\D/g,'');
  const waUrl = `https://wa.me/${waPhone}?text=${encodeURIComponent(mensaje)}`;
  window.open(waUrl,'_blank');

  alert('Mensaje enviado a WhatsApp. Verifica el pago y registra la venta en el panel.');
});

/* ------------------------- PANEL ADMINISTRATIVO ------------------------- */
document.getElementById('btnSoporte').addEventListener('click', ()=>{
  const clave = prompt('Ingresa el código de acceso al panel:');
  if(clave!=='rifa2025'){ alert('Código incorrecto'); return; }
  const panel = window.open('','_blank','noopener,noreferrer');
  if(!panel){ alert('Permite ventanas emergentes'); return; }
  panel.document.write('<h1>Panel Administrativo RifaResuelve 1.0</h1><p>Panel abierto correctamente.</p>');
  panel.document.title = 'Panel Administrativo';
});
</script>
</body>
</html>
